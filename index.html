<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BaiYongQiang - Digital Garden</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --theme-color: #42b983;
      --bg-dark: #0f1115;
      --card-bg: #1a1d24;
    }

    body {
      background-color: var(--bg-dark);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 核心逻辑：首页状态下隐藏 Docsify 内容并禁止滚动 */
    body:not(.is-article) {
      overflow: hidden;
    }
    body:not(.is-article) #app {
      display: none !important;
    }
    
    /* 文章页状态下允许滚动 */
    body.is-article {
      overflow: auto;
      background-color: #fff; /* 或者保持暗色，取决于你的 md 内容风格 */
    }

    /* 首页封面容器 */
    #main-cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between; /* 让页脚沉到底部 */
      background: var(--bg-dark);
      color: white;
      text-align: center;
    }

    /* 顶部导航 */
    .nav-header {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: flex-start;
      box-sizing: border-box;
    }
    .brand-logo {
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      color: #555;
      text-decoration: none;
      transition: color 0.3s;
    }
    .brand-logo:hover {
      color: #fff;
    }

    /* 栅格布局 */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      width: 90%;
      max-width: 1100px;
      margin: 40px 0;
    }

    .card {
      background: var(--card-bg);
      padding: 35px;
      border-radius: 12px;
      text-align: left;
      text-decoration: none;
      color: white;
      transition: transform 0.3s, border-color 0.3s;
      border: 1px solid transparent;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--theme-color);
    }

    .card h3 { margin-top: 0; color: #fff; display: flex; align-items: center; gap: 10px; }
    .card p { color: #888; font-size: 14px; line-height: 1.6; }

    /* Slogan */
    .slogan-area { margin-bottom: 20px; }
    .en-slogan { font-style: italic; color: #444; font-family: Georgia, serif; }

    /* 页脚 */
    .custom-footer {
      width: 100%;
      padding: 30px 0;
      color: #333;
      font-size: 13px;
      border-top: 1px solid #1a1d24;
    }

    /* Docsify 文章页微调 */
    .markdown-section { max-width: 800px; }
  </style>
</head>
<body>

  <!-- 首页封面 -->
  <div id="main-cover">
    <header class="nav-header">
      <a href="#/" class="brand-logo">BaiYongQiang</a>
    </header>

    <div class="grid-container">
      <a href="#/retail" class="card">
        <h3>🏪 零售信息化</h3>
        <p>门店系统与运营优化实践，数字化转型解决方案。</p>
      </a>
      <a href="#/ai" class="card">
        <h3>🤖 AI 探索</h3>
        <p>技术在商业场景中的增效应用，持续学习与进化。</p>
      </a>
      <a href="#/invest-logic" class="card">
        <h3>💰 投资与经济</h3>
        <p>市场逻辑与长期价值判断，理性思考的数字化呈现。</p>
      </a>
    </div>

    <div class="slogan-area">
      <p class="en-slogan">"Reborn with AI, defined by lifelong learning."</p>
    </div>

    <footer class="custom-footer">
      <p>© 2026 BaiYongQiang. Built with Docsify.</p>
    </footer>
  </div>

  <!-- Docsify 挂载点 -->
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: 'BaiYongQiang',
      repo: '',
      loadSidebar: false,
      // 这里的 subMaxLevel 可以帮助生成目录
      subMaxLevel: 2,
      mounted: function() {
        checkRoute();
      }
    };

    // 核心路由控制逻辑
    function checkRoute() {
      const cover = document.getElementById('main-cover');
      // 如果是首页路径 (#/ 或空)
      if (!window.location.hash || window.location.hash === '#/') {
        cover.style.display = 'flex';
        document.body.classList.remove('is-article');
      } else {
        // 如果是文章路径
        cover.style.display = 'none';
        document.body.classList.add('is-article');
        window.scrollTo(0, 0);
      }
    }

    // 监听 URL 变化
    window.addEventListener('hashchange', checkRoute);
  </script>
  
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
