<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BaiYongQiang | 零售数字化专家</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <style>
    body {
      margin: 0;
      background-color: #0f1115 !important;
      color: #eeeeee !important;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* 首页容器 */
    #main-cover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #0f1115;
    }

    /* 物理屏蔽 Docsify 的报错区域 */
    #app { display: none; } 
    body.is-article #app { display: block !important; }
    body.is-article #main-cover { display: none !important; }

    /* 导航栏 */
    .nav-bar { padding: 40px 8% 0 0; text-align: right; }
    .nav-bar a { color: #ddd; text-decoration: none; margin-left: 30px; font-size: 15px; }

    /* 品牌返回键 */
    .brand-logo {
      position: fixed; top: 30px; left: 40px; z-index: 9999;
      color: #fff; text-decoration: none; font-size: 18px; font-weight: bold;
      display: none;
    }
    body.is-article .brand-logo { display: block; }

    /* Hero 区域 */
    .hero { padding: 60px 10% 40px; }
    .hero h1 {
      font-size: 64px; margin: 0;
      background: linear-gradient(to bottom, #ffffff, #999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: #bbb; font-size: 18px; margin-top: 15px; }

    /* 卡片 */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 10%; }
    .card {
      background: #161920; border-radius: 12px; padding: 30px;
      border: 1px solid #333; text-decoration: none; transition: 0.3s;
    }
    .card:hover { border-color: #777; transform: translateY(-5px); }
    .card h3 { color: #fff; margin: 0 0 10px; }
    .card p { color: #999; font-size: 14px; }

    /* 底部区域：显著调亮字体 */
    .bottom-section { text-align: center; padding-bottom: 50px; }
    .en-slogan { 
      font-family: "Georgia", serif; font-style: italic; 
      font-size: 18px; color: #ffffff !important; /* 纯白，保证绝对清晰 */
      margin-bottom: 30px;
      opacity: 0.9;
    }
    .custom-footer {
      color: #bbbbbb !important; /* 浅灰色，保证清晰 */
      font-size: 13px;
      letter-spacing: 2px;
      border-top: 1px solid #333;
      padding-top: 25px;
      margin: 0 15%;
    }

    .content { background: #0f1115 !important; position: static !important; width: 100% !important; left: 0 !important; }
    .sidebar, .sidebar-toggle { display: none !important; }
  </style>
</head>
<body>

  <a href="#/" class="brand-logo">BaiYongQiang</a>

  <div id="main-cover">
    <div class="nav-bar">
      <a href="#/retail">零售</a>
      <a href="#/ai">AI</a>
      <a href="#/invest-logic">投资</a>
      <a href="#/about">关于</a>
    </div>

    <div class="main-content">
      <div class="hero">
        <h1>BaiYongQiang</h1>
        <p>零售行业数字化解决方案从业者<br>技术 × 商业 × 长期认知</p>
      </div>
      <div class="grid">
        <a href="#/retail" class="card"><h3>🏪 零售信息化</h3><p>门店系统与运营优化实践</p></a>
        <a href="#/ai" class="card"><h3>🤖 AI 探索</h3><p>技术在商业场景中的增效应用</p></a>
        <a href="#/invest-logic" class="card"><h3>💰 投资与经济</h3><p>市场与长期价值判断</p></a>
      </div>
    </div>

    <div class="bottom-section">
      <p class="en-slogan">"Reborn with AI, defined by lifelong learning."</p>
      <footer class="custom-footer">
        © 2026 BAIYONGQIANG · DIGITAL GARDEN
      </footer>
    </div>
  </div>

  <div id="app"></div>

  <script>
    window.$docsify = {
      hideSidebar: true,
      auto2top: true,
      // 关键：只有非首页才加载
      mounted: function() { checkRoute(); }
    };

    function checkRoute() {
      const isHome = !window.location.hash || window.location.hash === '#/';
      if (isHome) {
        document.body.classList.remove('is-article');
      } else {
        document.body.classList.add('is-article');
      }
    }

    window.addEventListener('hashchange', checkRoute);
    checkRoute();
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
