<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BaiYongQiang | 零售数字化专家</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <style>
    /* 1. 基础布局控制 */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0f1115 !important;
      /* 这里的修改是关键：不要在 html 层级锁死 overflow */
    }
    
    body.home-page {
      height: 100vh;
      overflow: hidden; 
    }

    /* 当进入文章页时，恢复正常滚动 */
    body.is-article {
      height: auto;
      overflow: auto !important;
    }

    /* 2. 首页封面 */
    #main-cover {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: #0f1115;
      z-index: 10;
      box-sizing: border-box;
    }

    body.is-article #main-cover {
      display: none !important;
    }

    /* 3. Docsify 容器 */
    #app {
      height: 0;
      overflow: hidden;
    }
    body.is-article #app {
      height: auto;
      overflow: visible;
      display: block;
    }

    /* 4. 导航与品牌 */
    .nav-bar { padding: 40px 8% 0 0; text-align: right; }
    .nav-bar a { color: #ddd; text-decoration: none; margin-left: 30px; font-size: 15px; }

    .brand-logo {
      position: fixed; top: 30px; left: 40px; z-index: 9999;
      color: #fff; text-decoration: none; font-size: 18px; font-weight: bold;
      display: none;
    }
    body.is-article .brand-logo { display: block; }

    /* 5. 核心内容区 */
    .hero { padding: 60px 10% 40px; }
    .hero h1 {
      font-size: 64px; margin: 0; font-weight: 700;
      background: linear-gradient(to bottom, #ffffff, #999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p { color: #bbb; font-size: 18px; margin-top: 15px; line-height: 1.6; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 10%; }
    .card {
      background: #161920; border-radius: 12px; padding: 30px;
      border: 1px solid #333; text-decoration: none; transition: 0.3s;
    }
    .card:hover { border-color: #777; transform: translateY(-5px); }
    .card h3 { color: #fff; margin: 0 0 10px; font-size: 20px; }
    .card p { color: #999; font-size: 14px; }

    /* 6. 底部区域 */
    .bottom-section { text-align: center; padding-bottom: 50px; }
    .en-slogan { 
      font-family: "Georgia", serif; font-style: italic; 
      font-size: 18px; color: #ffffff !important; 
      margin-bottom: 30px;
    }
    .custom-footer {
      color: #bbbbbb !important;
      font-size: 12px;
      letter-spacing: 2px;
      border-top: 1px solid #333;
      padding: 25px 0;
      margin: 0 15%;
    }

    /* Docsify 文章页样式调整 */
    .sidebar, .sidebar-toggle { display: none !important; }
    .content { position: static !important; width: 100% !important; left: 0 !important; padding-top: 60px !important;}

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      #main-cover { height: 100vh; overflow-y: auto; position: relative; }
      .nav-bar { display: none; }
      body.home-page { overflow: auto; }
    }
  </style>
</head>
<body class="home-page">

  <a href="#/" class="brand-logo">BaiYongQiang</a>

  <div id="main-cover">
    <div class="nav-bar">
      <a href="#/retail">零售</a>
      <a href="#/ai">AI</a>
      <a href="#/invest-logic">投资</a>
      <a href="#/about">关于</a>
    </div>

    <div class="main-content">
      <div class="hero">
        <h1>BaiYongQiang</h1>
        <p>零售行业数字化解决方案从业者<br>技术 × 商业 × 长期认知</p>
      </div>
      <div class="grid">
        <a href="#/retail" class="card"><h3>🏪 零售信息化</h3><p>门店系统与运营优化</p></a>
        <a href="#/ai" class="card"><h3>🤖 AI 探索</h3><p>技术在场景中的应用</p></a>
        <a href="#/invest-logic" class="card"><h3>💰 投资与经济</h3><p>市场与长期价值判断</p></a>
      </div>
    </div>

    <div class="bottom-section">
      <p class="en-slogan">"Reborn with AI, defined by lifelong learning."</p>
      <footer class="custom-footer">
        © 2026 BAIYONGQIANG · DIGITAL GARDEN
      </footer>
    </div>
  </div>

  <div id="app">载入中...</div>

  <script>
    window.$docsify = {
      name: 'BaiYongQiang',
      hideSidebar: true,
      auto2top: true,
      // 核心修复：plugins 必须在这里！
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            // 每次渲染完文章，强制滚回顶部
            window.scrollTo(0, 0);
            // 针对极少数浏览器的补偿
            document.documentElement.scrollTop = 0;
          });
        }
      ]
    };

    function handleRoute() {
      const isHome = !window.location.hash || window.location.hash === '#/';
      if (isHome) {
        document.body.classList.remove('is-article');
        document.body.classList.add('home-page');
        window.scrollTo(0, 0);
      } else {
        document.body.classList.add('is-article');
        document.body.classList.remove('home-page');
      }
    }

    window.addEventListener('hashchange', handleRoute);
    window.addEventListener('load', handleRoute);
    function copyEmail(email, btn) {
    navigator.clipboard.writeText(email).then(() => {
        const originalText = btn.innerText;
        btn.innerText = '已复制！';
        btn.style.background = '#28a745';
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = '#333';
        }, 2000);
    }).catch(err => {
        console.error('复制失败: ', err);
        alert('复制失败，请手动复制: ' + email);
    });
}
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
