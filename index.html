<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>BaiYongQiang 的数字复盘空间</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">正在加载，请稍候...</div>
  <script>
  window.$docsify = {
    name: 'BaiYongQiang',
    // 1. 删除 repo 这一行，右上角的 GitHub 绿三角就会消失
    loadSidebar: true,   // 2. 开启侧边栏
    subMaxLevel: 2,      // 侧边栏自动提取页面的二级标题
    coverpage: true,     
    onlyCover: false,    // 建议设为 false，这样向下滚动时能看到侧边栏
    auto2top: true
  }
</script>

<style>
  /* 去除 Docsify 默认的顶部渐变背景 */
  section.cover {
    background: #ffffff !important; /* 设为纯白，或者你喜欢的任何颜色 */
  }
  /* 让侧边栏文字更黑更清晰 */
  .sidebar ul li a {
    color: #333 !important;
    font-weight: normal;
  }
</style>
</body>
</html>
