<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>关于我 - BaiYongQiang</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.8; color: #333; }
        .card { padding: 40px; border: 1px solid #ddd; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; color: #333; font-size: 24px; }
        h3 { color: #444; margin-top: 30px; border-left: 4px solid #007bff; padding-left: 10px; font-size: 18px; }
        ul { padding-left: 20px; list-style-type: square; }
        li { margin-bottom: 10px; }
        .contact-section { margin-top: 40px; padding-top: 20px; border-top: 1px dashed #ccc; }
        .back-link { display: block; text-align: center; margin-top: 40px; color: #666; text-decoration: none; font-size: 0.9em; }
        
        /* 复制功能的样式 */
        .copy-email { cursor: pointer; color: #007bff; border-bottom: 1px dashed #007bff; position: relative; display: inline-block; }
        .copy-tip { visibility: hidden; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 2px 8px; position: absolute; z-index: 1; bottom: 125%; left: 50%; margin-left: -30px; opacity: 0; transition: opacity 0.3s; font-size: 12px; }
        .copy-tip.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

<div class="card">
    <h1>关于我</h1>
    <p><strong>BaiYongQiang</strong></p>

    <h3>📌 个人经历</h3>
    <ul>
        <li><strong>专业：</strong> 计算机科学</li>
        <li><strong>职业：</strong> 曾任技术岗位，现专注于业务管理</li>
        <li><strong>状态：</strong> 利用 AI 辅助，重新构建个人数字实验空间</li>
    </ul>

    <h3>🛡️ 探索方向</h3>
    <ul>
        <li><strong>安全：</strong> 私钥生命周期管理与离线存储逻辑研究</li>
        <li><strong>思考：</strong> 通过实践拆解复杂概念，实现认知的有序沉淀</li>
        <li><strong>效率：</strong> 个人信息流处理与工作流优化</li>
    </ul>

    <div class="contact-section">
        <h3>🤝 联系交流</h3>
        <p>可以通过以下方式找到我：</p>
        <p>
            📩 <strong>Mail:</strong> 
            <span class="copy-email" onclick="copyToClipboard('hi@你的域名.com', this)">
                hi@baiyongqiang.com
                <span class="copy-tip">已复制</span>
            </span>
        </p>
        
    </div>

    <a href="index.html" class="back-link">← 返回首页</a>
</div>

<script>
function copyToClipboard(text, element) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
        document.execCommand('copy');
        const tip = element.querySelector('.copy-tip');
        tip.classList.add('show');
        setTimeout(() => { tip.classList.remove('show'); }, 1500);
    } catch (err) {
        console.error('无法复制', err);
    }
    document.body.removeChild(textArea);
}
</script>

</body>
</html>
